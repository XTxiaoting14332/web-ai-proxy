<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AI Proxy Settings</title>
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      padding: 16px; 
      width: 320px; 
      background-color: #f9fafb; 
      margin: 0; 
    }
    h2 { 
      margin-top: 0; 
      font-size: 16px; 
      color: #111827; 
      text-align: center;
      margin-bottom: 16px;
    }
    label { 
      display: block; 
      font-size: 13px; 
      margin-bottom: 6px; 
      color: #4b5563; 
      font-weight: 500; 
    }
    input { 
      width: 100%; 
      box-sizing: border-box; 
      padding: 10px; 
      margin-bottom: 16px; 
      border: 1px solid #d1d5db; 
      border-radius: 6px; 
      font-size: 14px;
      outline: none;
    }
    input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }
    button { 
      width: 100%; 
      padding: 10px; 
      background-color: #4f46e5; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-weight: 600; 
      font-size: 14px;
      transition: background-color 0.2s;
    }
    button:hover { 
      background-color: #4338ca; 
    }
    #status { 
      font-size: 13px; 
      color: #10b981; 
      margin-top: 12px; 
      text-align: center; 
      height: 16px; 
      font-weight: 500;
    }
  </style>
</head>
<body>
  <h2>AI Web Proxy</h2>
  <label for="wsUrl">Backend Server Address</label>
  <input type="text" id="wsUrl" placeholder="ws://127.0.0.1:8080/ws" />
  <button id="saveBtn">Save Configuration</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
